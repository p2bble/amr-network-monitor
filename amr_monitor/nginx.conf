server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Flutter Web SPA: 404 발생 시 index.html 로 fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # JS/CSS/이미지 장기 캐싱
    location ~* \.(js|css|png|jpg|ico|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # gzip 압축
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}
